<template>
  <div class="filtered-gallery">
    <!-- Sort Controls -->
    <div class="sort-controls slds-m-bottom_medium">
      <div class="slds-text-body_small slds-text-color_weak">
        Showing {filteredCount} of {totalCount} components
      </div>
      <div class="sort-selector">
        <label class="sort-label" for="sort-select">Sort by:</label>
        <div class="slds-select_container sort-select-container">
          <select class="slds-select sort-select" id="sort-select" value={sortBy} onchange={handleSortChange}>
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="score-desc">Score: High to Low</option>
            <option value="score-asc">Score: Low to High</option>
            <option value="slds-desc">SLDS: High to Low</option>
            <option value="violations-asc">Violations: Low to High</option>
            <option value="model">Group by Model</option>
            <option value="tier">Group by Tier</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Gallery Grid -->
    <template if:true={hasComponents}>
      <div class="gallery-grid">
        <template for:each={displayComponents} for:item="component">
          <article key={component.componentName} class="slds-card component-card">
            <!-- Quality Gate Badge -->
            <div class={component.qualityGateBadgeClass}>
              {component.qualityGateLabel}
            </div>

            <div class="slds-card__body slds-card__body_inner slds-p-around_small">
              <div class="component-header slds-m-bottom_xx-small">
                <h2 class="slds-text-heading_small slds-truncate" title={component.displayName}>
                  {component.displayName}
                </h2>
              </div>

              <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                {component.tier} • {component.complexity}
                <template if:true={component.variant}>
                  • {component.variant}
                </template>
                • {component.formattedDate}
              </div>

              <!-- Metadata badges -->
              <template if:true={component.hasMetadataBadges}>
                <div class="metadata-badges slds-m-bottom_small">
                  <template if:true={component.utteranceId}>
                    <span class="metadata-badge utterance-badge" title="Utterance ID">
                      {component.utteranceId}
                    </span>
                  </template>
                  <template if:true={component.variant}>
                    <span class="metadata-badge variant-badge" title="Variant">
                      <svg class="slds-icon slds-icon_xx-small" aria-hidden="true">
                        <use xlink:href="/public/slds/icons/utility-sprite/svg/symbols.svg#layers"></use>
                      </svg>
                      <span class="metadata-badge-text">{component.variant}</span>
                    </span>
                  </template>
                  <template if:true={component.model}>
                    <span class="metadata-badge model-badge" title="AI Model">
                      <svg class="slds-icon slds-icon_xx-small" aria-hidden="true">
                        <use xlink:href="/public/slds/icons/utility-sprite/svg/symbols.svg#einstein"></use>
                      </svg>
                      <span class="metadata-badge-text">{component.model}</span>
                    </span>
                  </template>
                </div>
              </template>

              <!-- Screenshot -->
              <template if:true={component.screenshotUrls.desktop}>
                <div class="screenshot-container slds-m-bottom_small">
                  <img
                    src={component.screenshotUrls.desktop}
                    alt={component.componentName}
                    class="screenshot-preview"
                    onclick={handleComponentSelect}
                    data-name={component.componentName}>
                </div>
              </template>

              <!-- Scores -->
              <div class="score-section slds-m-bottom_x-small">
                <span class="score-overall">
                  Overall: {component.formattedScore}
                </span>
                <span class="score-slds slds-text-color_weak">
                  SLDS: {component.formattedSldsScore}
                </span>
              </div>

              <!-- Violations -->
              <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                Violations: {component.violations.warnings}W {component.violations.errors}E
              </div>
            </div>

            <footer class="slds-card__footer">
              <button
                class="slds-button slds-button_brand slds-button_stretch"
                onclick={handleComponentSelect}
                data-name={component.componentName}>
                View Details
              </button>
            </footer>
          </article>
        </template>
      </div>
    </template>

    <!-- No Results -->
    <template if:false={hasComponents}>
      <div class="slds-align_absolute-center slds-m-top_xx-large">
        <div class="slds-text-align_center">
          <svg class="slds-icon slds-icon_large slds-icon-text-default" aria-hidden="true">
            <use xlink:href="/public/slds/icons/utility-sprite/svg/symbols.svg#filter"></use>
          </svg>
          <h2 class="slds-text-heading_medium slds-m-top_medium">
            No components match your filters
          </h2>
          <p class="slds-text-body_regular slds-m-top_small slds-text-color_weak">
            Try adjusting your filter criteria
          </p>
        </div>
      </div>
    </template>
  </div>
</template>
