<template>
    <!-- Form container with SLDS styling -->
    <div class="slds-box slds-theme_default">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Contact Form</h2>

        <!-- Success message display -->
        <template lwc:if={showSuccess}>
            <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                <span class="slds-assistive-text">Success</span>
                <h2>Form submitted successfully!</h2>
            </div>
        </template>

        <!-- Form fields -->
        <form onsubmit={handleSubmit}>
            <!-- Name field -->
            <div class="slds-m-bottom_medium">
                <lightning-input
                    label="Name"
                    name="name"
                    value={nameValue}
                    onchange={handleNameChange}
                    required
                    message-when-value-missing={nameErrorMessage}
                    variant="label-stacked">
                </lightning-input>
            </div>

            <!-- Email field -->
            <div class="slds-m-bottom_medium">
                <lightning-input
                    type="email"
                    label="Email"
                    name="email"
                    value={emailValue}
                    onchange={handleEmailChange}
                    required
                    message-when-value-missing={emailErrorMessage}
                    variant="label-stacked">
                </lightning-input>
            </div>

            <!-- Message field -->
            <div class="slds-m-bottom_medium">
                <lightning-textarea
                    label="Message"
                    name="message"
                    value={messageValue}
                    onchange={handleMessageChange}
                    required
                    message-when-value-missing={messageErrorMessage}
                    variant="label-stacked">
                </lightning-textarea>
            </div>

            <!-- Submit button -->
            <div class="slds-text-align_right">
                <lightning-button
                    type="submit"
                    label="Submit"
                    variant="brand"
                    class="slds-m-top_medium">
                </lightning-button>
            </div>
        </form>
    </div>
</template>
