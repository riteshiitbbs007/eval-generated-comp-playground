<template>
    <lightning-card title="Contact Information Form" icon-name="standard:contact">
        <!-- Form Container -->
        <div class="slds-p-around_medium">
            <!-- Success Message -->
            <template lwc:if={showSuccess}>
                <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                    <span class="slds-assistive-text">Success</span>
                    <lightning-icon icon-name="utility:success" alternative-text="Success" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <h2>Form submitted successfully!</h2>
                </div>
            </template>

            <!-- Error Message -->
            <template lwc:if={showError}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <lightning-icon icon-name="utility:error" alternative-text="Error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <h2>Please correct the errors below.</h2>
                </div>
            </template>

            <!-- Form Fields using SLDS Grid -->
            <form class="slds-form" onsubmit={handleSubmit}>
                <!-- Name Fields Row -->
                <div class="slds-grid slds-gutters slds-wrap">
                    <!-- First Name -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input
                            name="firstName"
                            label="First Name"
                            value={formData.firstName}
                            onchange={handleInputChange}
                            required
                            message-when-value-missing="Please enter your first name"
                            class="slds-m-bottom_small"
                        ></lightning-input>
                    </div>

                    <!-- Last Name -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input
                            name="lastName"
                            label="Last Name"
                            value={formData.lastName}
                            onchange={handleInputChange}
                            required
                            message-when-value-missing="Please enter your last name"
                            class="slds-m-bottom_small"
                        ></lightning-input>
                    </div>
                </div>

                <!-- Contact Fields Row -->
                <div class="slds-grid slds-gutters slds-wrap">
                    <!-- Email -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input
                            name="email"
                            label="Email Address"
                            type="email"
                            value={formData.email}
                            onchange={handleInputChange}
                            required
                            message-when-value-missing="Please enter your email address"
                            message-when-type-mismatch="Please enter a valid email address"
                            class="slds-m-bottom_small"
                        ></lightning-input>
                    </div>

                    <!-- Phone -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input
                            name="phone"
                            label="Phone Number"
                            type="tel"
                            value={formData.phone}
                            onchange={handleInputChange}
                            required
                            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                            message-when-value-missing="Please enter your phone number"
                            message-when-pattern-mismatch="Phone must be in format: 123-456-7890"
                            placeholder="123-456-7890"
                            class="slds-m-bottom_small"
                        ></lightning-input>
                    </div>
                </div>

                <!-- Country Dropdown -->
                <div class="slds-m-bottom_small">
                    <lightning-combobox
                        name="country"
                        label="Country"
                        value={formData.country}
                        placeholder="Select a country"
                        options={countryOptions}
                        onchange={handleInputChange}
                        required
                        message-when-value-missing="Please select a country"
                    ></lightning-combobox>
                </div>

                <!-- Interests Checkboxes -->
                <div class="slds-m-bottom_small">
                    <fieldset class="slds-form-element">
                        <legend class="slds-form-element__legend slds-form-element__label">Interests</legend>
                        <div class="slds-form-element__control">
                            <lightning-checkbox-group
                                name="interests"
                                label="Select your interests"
                                options={interestOptions}
                                value={formData.interests}
                                onchange={handleCheckboxChange}
                            ></lightning-checkbox-group>
                        </div>
                    </fieldset>
                </div>

                <!-- Comments Textarea -->
                <div class="slds-m-bottom_small">
                    <lightning-textarea
                        name="comments"
                        label="Comments or Notes"
                        value={formData.comments}
                        onchange={handleInputChange}
                        placeholder="Enter any additional comments or notes"
                        max-length="500"
                    ></lightning-textarea>
                </div>

                <!-- Action Buttons -->
                <div class="slds-grid slds-grid_align-end slds-gutters">
                    <div class="slds-col">
                        <lightning-button
                            label="Reset"
                            variant="neutral"
                            onclick={handleReset}
                            class="slds-m-right_x-small"
                        ></lightning-button>
                    </div>
                    <div class="slds-col">
                        <lightning-button
                            label="Submit"
                            variant="brand"
                            type="submit"
                        ></lightning-button>
                    </div>
                </div>
            </form>
        </div>
    </lightning-card>
</template>
