<template>
    <!-- Modal and Backdrop Structure -->
    <!-- Display modal only when isOpen is true -->
    <template lwc:if={isOpen}>
        <!-- SLDS Backdrop - clicking closes modal -->
        <div class="slds-backdrop slds-backdrop_open" onclick={handleBackdropClick}></div>

        <!-- SLDS Modal Container -->
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby="modal-heading"
            aria-describedby="modal-content"
            class="slds-modal slds-fade-in-open slds-modal_medium"
            onkeydown={handleKeyDown}>

            <div class="slds-modal__container">
                <!-- Modal Header -->
                <header class="slds-modal__header">
                    <!-- Close button in header -->
                    <button
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        title="Close"
                        aria-label="Close"
                        onclick={handleCancel}
                        data-id="close-button">
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    </button>

                    <!-- Warning icon and title -->
                    <div class="slds-media slds-media_center">
                        <div class="slds-media__figure">
                            <span class="slds-icon_container slds-icon-text-warning">
                                <lightning-icon
                                    icon-name="utility:warning"
                                    alternative-text="warning"
                                    size="small"
                                    class="slds-icon-text-warning">
                                </lightning-icon>
                            </span>
                        </div>
                        <div class="slds-media__body">
                            <h2 id="modal-heading" class="slds-text-heading_medium">
                                Confirm Delete
                            </h2>
                        </div>
                    </div>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content">
                    <p class="slds-text-body_regular">
                        Are you sure you want to delete this item? This action cannot be undone.
                    </p>
                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer">
                    <!-- Cancel button - neutral variant -->
                    <button
                        class="slds-button slds-button_neutral"
                        onclick={handleCancel}
                        data-id="cancel-button">
                        Cancel
                    </button>

                    <!-- Delete button - destructive variant with left margin -->
                    <button
                        class="slds-button slds-button_destructive slds-m-left_x-small"
                        onclick={handleDelete}
                        data-id="delete-button">
                        Delete
                    </button>
                </footer>
            </div>
        </section>
    </template>
</template>
