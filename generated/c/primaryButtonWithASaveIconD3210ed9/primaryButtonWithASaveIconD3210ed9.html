<template>
    <!-- Primary button with save icon using Lightning Base Component -->
    <!-- Using lightning-button with brand variant for SLDS 2 primary button styling -->
    <!-- Icon positioned to the left of the button label text -->
    <lightning-button
        variant="brand"
        label="Save"
        icon-name="utility:save"
        icon-position="left"
        onclick={handleSaveClick}
        title="Save"
        class="slds-m-around_medium"
    ></lightning-button>
</template>
