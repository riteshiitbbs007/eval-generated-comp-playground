<template>
    <!-- Main card container following SLDS design patterns -->
    <lightning-card title="Contact Information Form" icon-name="standard:contact">
        <div class="slds-p-around_medium">
            <!-- Form container with proper SLDS grid layout -->
            <div class="slds-form" role="form">

                <!-- Full Name Input - Text field -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-input
                        name="fullName"
                        label="Full Name"
                        type="text"
                        value={fullName}
                        onchange={handleInputChange}
                        required
                        message-when-value-missing="Please enter your full name"
                        class="slds-input-has-icon slds-input-has-icon_left">
                    </lightning-input>
                </div>

                <!-- Email Input -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-input
                        name="email"
                        label="Email Address"
                        type="email"
                        value={email}
                        onchange={handleInputChange}
                        required
                        message-when-value-missing="Please enter your email"
                        message-when-type-mismatch="Please enter a valid email address">
                    </lightning-input>
                </div>

                <!-- Phone Input -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-input
                        name="phone"
                        label="Phone Number"
                        type="tel"
                        value={phone}
                        onchange={handleInputChange}
                        required
                        message-when-value-missing="Please enter your phone number"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        message-when-pattern-mismatch="Please enter a valid phone number (123-456-7890)">
                    </lightning-input>
                </div>

                <!-- Country Dropdown - Combobox -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-combobox
                        name="country"
                        label="Country"
                        value={country}
                        placeholder="Select a country"
                        options={countryOptions}
                        onchange={handleInputChange}
                        required
                        message-when-value-missing="Please select a country">
                    </lightning-combobox>
                </div>

                <!-- Interest Areas - Checkbox Group -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-checkbox-group
                        name="interests"
                        label="Areas of Interest"
                        options={interestOptions}
                        value={interests}
                        onchange={handleInputChange}>
                    </lightning-checkbox-group>
                </div>

                <!-- Comments - Textarea -->
                <div class="slds-form-element slds-m-bottom_medium">
                    <lightning-textarea
                        name="comments"
                        label="Comments"
                        value={comments}
                        onchange={handleInputChange}
                        placeholder="Please share any additional information..."
                        max-length="500">
                    </lightning-textarea>
                </div>

                <!-- Form Actions - Submit and Reset Buttons -->
                <div class="slds-form-element slds-m-top_large">
                    <div class="slds-grid slds-grid_align-end slds-gutters_small">
                        <div class="slds-col">
                            <lightning-button
                                label="Reset"
                                onclick={handleReset}
                                class="slds-m-right_x-small">
                            </lightning-button>
                        </div>
                        <div class="slds-col">
                            <lightning-button
                                variant="brand"
                                label="Submit"
                                onclick={handleSubmit}
                                class="slds-m-left_x-small">
                            </lightning-button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </lightning-card>
</template>
