<template>
    <!-- Page Header container following SLDS pattern -->
    <div class="slds-page-header">
        <div class="slds-page-header__row">
            <!-- Title section on the left -->
            <div class="slds-page-header__col-title">
                <div class="slds-media">
                    <div class="slds-media__body">
                        <div class="slds-page-header__name">
                            <div class="slds-page-header__name-title">
                                <h1>
                                    <span class="slds-page-header__title slds-truncate" title={title}>{title}</span>
                                </h1>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Action buttons section on the right -->
            <div class="slds-page-header__col-actions">
                <div class="slds-page-header__controls">
                    <div class="slds-page-header__control">
                        <ul class="slds-button-group-list">
                            <template for:each={actionButtons} for:item="button">
                                <li key={button.id}>
                                    <lightning-button
                                        label={button.label}
                                        variant={button.variant}
                                        icon-name={button.iconName}
                                        onclick={handleButtonClick}
                                        data-id={button.id}
                                        class="slds-m-left_x-small"
                                    ></lightning-button>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
