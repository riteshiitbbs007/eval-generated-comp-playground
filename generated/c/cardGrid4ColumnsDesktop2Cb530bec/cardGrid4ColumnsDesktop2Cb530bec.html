<template>
    <!-- Responsive card grid container with SLDS grid utilities -->
    <div class="slds-grid slds-wrap slds-gutters">
        <!-- Iterate over card data to render cards dynamically -->
        <template for:each={cards} for:item="card">
            <div key={card.id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                <!-- Use Lightning Card base component for each card -->
                <lightning-card title={card.title} class="slds-m-bottom_small">
                    <!-- Card body content with proper spacing -->
                    <div class="slds-p-horizontal_small slds-p-bottom_small">
                        <p class="slds-text-body_regular">{card.description}</p>
                    </div>
                </lightning-card>
            </div>
        </template>
    </div>
</template>
