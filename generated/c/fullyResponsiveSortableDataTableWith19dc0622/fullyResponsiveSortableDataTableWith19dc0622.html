<template>
    <!-- Fully responsive sortable data table with SLDS styling -->
    <div class="slds-box slds-theme_default">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Product Inventory</h2>

        <!-- Table with SLDS responsive stacking for mobile -->
        <table class="slds-table slds-table_bordered slds-table_fixed-layout slds-max-medium-table_stacked">
            <thead>
                <tr class="slds-line-height_reset">
                    <!-- Product Name Column - sortable, left-aligned -->
                    <th class="slds-text-align_left slds-size_2-of-5" scope="col">
                        <a
                            href="#"
                            class="slds-th__action slds-text-link_reset"
                            role="button"
                            tabindex="0"
                            onclick={handleSortByName}
                            onkeydown={handleSortByName}
                            aria-label={nameSortAriaLabel}>
                            <span class="slds-assistive-text">Sort by: </span>
                            <div class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                <span class="slds-truncate" title="Product Name">Product Name</span>
                                <template lwc:if={isNameSorted}>
                                    <lightning-icon
                                        icon-name={nameSortIcon}
                                        size="xx-small"
                                        alternative-text={nameSortDirection}
                                        class="slds-m-left_xx-small">
                                    </lightning-icon>
                                </template>
                            </div>
                        </a>
                    </th>

                    <!-- Price Column - sortable, right-aligned -->
                    <th class="slds-text-align_right slds-size_1-of-6" scope="col">
                        <a
                            href="#"
                            class="slds-th__action slds-text-link_reset"
                            role="button"
                            tabindex="0"
                            onclick={handleSortByPrice}
                            onkeydown={handleSortByPrice}
                            aria-label={priceSortAriaLabel}>
                            <span class="slds-assistive-text">Sort by: </span>
                            <div class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                <span class="slds-truncate" title="Price">Price</span>
                                <template lwc:if={isPriceSorted}>
                                    <lightning-icon
                                        icon-name={priceSortIcon}
                                        size="xx-small"
                                        alternative-text={priceSortDirection}
                                        class="slds-m-left_xx-small">
                                    </lightning-icon>
                                </template>
                            </div>
                        </a>
                    </th>

                    <!-- Category Column - center-aligned, not sortable -->
                    <th class="slds-text-align_center slds-size_1-of-6" scope="col">
                        <div class="slds-truncate" title="Category">Category</div>
                    </th>

                    <!-- Stock Status Column - center-aligned, not sortable -->
                    <th class="slds-text-align_center slds-size_1-of-6" scope="col">
                        <div class="slds-truncate" title="Stock Status">Stock Status</div>
                    </th>
                </tr>
            </thead>
            <tbody>
                <template for:each={sortedProducts} for:item="product">
                    <tr key={product.id} class="slds-hint-parent">
                        <!-- Product Name - left-aligned -->
                        <td data-label="Product Name" class="slds-text-align_left">
                            <div class="slds-truncate" title={product.name}>{product.name}</div>
                        </td>

                        <!-- Price - right-aligned, currency format -->
                        <td data-label="Price" class="slds-text-align_right">
                            <div class="slds-truncate">{product.formattedPrice}</div>
                        </td>

                        <!-- Category - center-aligned with neutral badge -->
                        <td data-label="Category" class="slds-text-align_center">
                            <span class="slds-badge">{product.category}</span>
                        </td>

                        <!-- Stock Status - center-aligned with semantic badges -->
                        <td data-label="Stock Status" class="slds-text-align_center">
                            <span class={product.statusBadgeClass}>{product.status}</span>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</template>
