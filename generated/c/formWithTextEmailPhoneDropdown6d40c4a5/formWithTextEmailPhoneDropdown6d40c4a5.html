<template>
    <!-- Form container with SLDS styling -->
    <div class="slds-box slds-theme_default">
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Contact Information Form</h2>

        <!-- Text input field -->
        <div class="slds-form-element slds-m-bottom_small">
            <label class="slds-form-element__label" for="text-input">
                <abbr class="slds-required" title="required">*</abbr>
                Full Name
            </label>
            <div class="slds-form-element__control">
                <input
                    type="text"
                    id="text-input"
                    name="fullName"
                    class="slds-input"
                    placeholder="Enter your full name"
                    value={fullName}
                    onchange={handleTextChange}
                    required />
            </div>
        </div>

        <!-- Email input field -->
        <div class="slds-form-element slds-m-bottom_small">
            <label class="slds-form-element__label" for="email-input">
                <abbr class="slds-required" title="required">*</abbr>
                Email Address
            </label>
            <div class="slds-form-element__control">
                <input
                    type="email"
                    id="email-input"
                    name="email"
                    class="slds-input"
                    placeholder="Enter your email"
                    value={email}
                    onchange={handleEmailChange}
                    required />
            </div>
        </div>

        <!-- Phone input field -->
        <div class="slds-form-element slds-m-bottom_small">
            <label class="slds-form-element__label" for="phone-input">
                Phone Number
            </label>
            <div class="slds-form-element__control">
                <input
                    type="tel"
                    id="phone-input"
                    name="phone"
                    class="slds-input"
                    placeholder="(555) 555-5555"
                    value={phone}
                    onchange={handlePhoneChange} />
            </div>
        </div>

        <!-- Dropdown/picklist field -->
        <div class="slds-form-element slds-m-bottom_small">
            <label class="slds-form-element__label" for="dropdown-select">
                <abbr class="slds-required" title="required">*</abbr>
                Preferred Contact Method
            </label>
            <div class="slds-form-element__control">
                <div class="slds-select_container">
                    <select
                        id="dropdown-select"
                        name="contactMethod"
                        class="slds-select"
                        value={contactMethod}
                        onchange={handleDropdownChange}
                        required>
                        <option value="">--Select--</option>
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                        <option value="text">Text Message</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Checkbox group -->
        <div class="slds-form-element slds-m-bottom_small">
            <fieldset class="slds-form-element">
                <legend class="slds-form-element__legend slds-form-element__label">
                    Interests
                </legend>
                <div class="slds-form-element__control">
                    <div class="slds-checkbox">
                        <input
                            type="checkbox"
                            id="checkbox-products"
                            name="interests"
                            value="products"
                            checked={interests.products}
                            onchange={handleCheckboxChange} />
                        <label class="slds-checkbox__label" for="checkbox-products">
                            <span class="slds-checkbox_faux"></span>
                            <span class="slds-form-element__label">Product Updates</span>
                        </label>
                    </div>
                    <div class="slds-checkbox">
                        <input
                            type="checkbox"
                            id="checkbox-newsletter"
                            name="interests"
                            value="newsletter"
                            checked={interests.newsletter}
                            onchange={handleCheckboxChange} />
                        <label class="slds-checkbox__label" for="checkbox-newsletter">
                            <span class="slds-checkbox_faux"></span>
                            <span class="slds-form-element__label">Newsletter</span>
                        </label>
                    </div>
                    <div class="slds-checkbox">
                        <input
                            type="checkbox"
                            id="checkbox-events"
                            name="interests"
                            value="events"
                            checked={interests.events}
                            onchange={handleCheckboxChange} />
                        <label class="slds-checkbox__label" for="checkbox-events">
                            <span class="slds-checkbox_faux"></span>
                            <span class="slds-form-element__label">Events & Webinars</span>
                        </label>
                    </div>
                </div>
            </fieldset>
        </div>

        <!-- Textarea field -->
        <div class="slds-form-element slds-m-bottom_small">
            <label class="slds-form-element__label" for="textarea-comments">
                Additional Comments
            </label>
            <div class="slds-form-element__control">
                <textarea
                    id="textarea-comments"
                    name="comments"
                    class="slds-textarea"
                    placeholder="Enter any additional comments"
                    rows="4"
                    value={comments}
                    onchange={handleTextareaChange}></textarea>
            </div>
        </div>

        <!-- Submit button -->
        <div class="slds-m-top_medium">
            <button
                class="slds-button slds-button_brand"
                onclick={handleSubmit}
                disabled={isSubmitDisabled}>
                Submit
            </button>
        </div>
    </div>
</template>
