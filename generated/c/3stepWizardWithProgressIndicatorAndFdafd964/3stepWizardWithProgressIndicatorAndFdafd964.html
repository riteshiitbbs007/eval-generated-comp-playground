<template>
    <!-- Main wizard container with proper semantic structure -->
    <div class="slds-wizard-container">

        <!-- Progress Indicator Section -->
        <div class="slds-progress slds-progress_vertical" role="progressbar" aria-valuemin="1" aria-valuemax="3" aria-valuenow={currentStep} aria-label="Wizard Progress">
            <ol class="slds-progress__list">
                <!-- Step 1 -->
                <li class={step1Class}>
                    <button
                        class="slds-button slds-progress__marker"
                        data-step="1"
                        onclick={handleStepClick}
                        aria-label={step1AriaLabel}
                        disabled={isStep1Disabled}>
                        <span class="slds-assistive-text">{step1Status}</span>
                    </button>
                    <div class="slds-progress__item_content">
                        <div class="slds-m-top_x-small">Step 1</div>
                    </div>
                </li>

                <!-- Step 2 -->
                <li class={step2Class}>
                    <button
                        class="slds-button slds-progress__marker"
                        data-step="2"
                        onclick={handleStepClick}
                        aria-label={step2AriaLabel}
                        disabled={isStep2Disabled}>
                        <span class="slds-assistive-text">{step2Status}</span>
                    </button>
                    <div class="slds-progress__item_content">
                        <div class="slds-m-top_x-small">Step 2</div>
                    </div>
                </li>

                <!-- Step 3 -->
                <li class={step3Class}>
                    <button
                        class="slds-button slds-progress__marker"
                        data-step="3"
                        onclick={handleStepClick}
                        aria-label={step3AriaLabel}
                        disabled={isStep3Disabled}>
                        <span class="slds-assistive-text">{step3Status}</span>
                    </button>
                    <div class="slds-progress__item_content">
                        <div class="slds-m-top_x-small">Step 3</div>
                    </div>
                </li>
            </ol>
        </div>

        <!-- Step Content Area -->
        <div class="slds-wizard-content">
            <div class="slds-box slds-theme_default slds-m-bottom_medium">

                <!-- Step 1 Content -->
                <template lwc:if={isStep1}>
                    <div class="slds-text-heading_medium slds-m-bottom_small">
                        Step 1: Getting Started
                    </div>
                    <div class="slds-text-body_regular">
                        <p>Welcome to the wizard! This is the first step of the process.</p>
                        <p class="slds-m-top_small">Please review the information and click Next to continue.</p>
                    </div>
                </template>

                <!-- Step 2 Content -->
                <template lwc:if={isStep2}>
                    <div class="slds-text-heading_medium slds-m-bottom_small">
                        Step 2: Configuration
                    </div>
                    <div class="slds-text-body_regular">
                        <p>You're now on the second step. Configure your settings here.</p>
                        <p class="slds-m-top_small">Use the Back button to return or Next to proceed.</p>
                    </div>
                </template>

                <!-- Step 3 Content -->
                <template lwc:if={isStep3}>
                    <div class="slds-text-heading_medium slds-m-bottom_small">
                        Step 3: Review and Finish
                    </div>
                    <div class="slds-text-body_regular">
                        <p>This is the final step. Review your choices and click Finish to complete.</p>
                        <p class="slds-m-top_small">You can go back to make changes if needed.</p>
                    </div>
                </template>

            </div>

            <!-- Navigation Buttons -->
            <div class="slds-clearfix">
                <div class="slds-float_right">
                    <lightning-button
                        variant="neutral"
                        label="Back"
                        onclick={handleBack}
                        disabled={isBackDisabled}
                        class="slds-m-right_x-small">
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label={nextButtonLabel}
                        onclick={handleNext}>
                    </lightning-button>
                </div>
            </div>
        </div>

    </div>
</template>
