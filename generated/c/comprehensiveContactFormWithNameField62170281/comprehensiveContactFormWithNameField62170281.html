<template>
    <!-- Main form container with SLDS styling and padding -->
    <div class="slds-box slds-theme_default slds-p-around_medium">
        <!-- Form title -->
        <h2 class="slds-text-heading_medium slds-m-bottom_medium">Contact Form</h2>

        <!-- Success message shown after successful submission -->
        <template lwc:if={showSuccessMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Success</span>
                <span class="slds-icon_container slds-icon-utility-success slds-m-right_x-small">
                    <svg class="slds-icon slds-icon_x-small" aria-hidden="true">
                        <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#success"></use>
                    </svg>
                </span>
                <h2>Form submitted successfully!</h2>
            </div>
        </template>

        <!-- Form element with stacked layout -->
        <form class="slds-form slds-form_stacked" onsubmit={handleSubmit}>

            <!-- Name field with validation -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-input
                    name="name"
                    label="Name"
                    type="text"
                    placeholder="Enter your full name"
                    value={nameValue}
                    required
                    max-length="100"
                    onchange={handleNameChange}
                    onblur={handleNameBlur}
                    class={nameFieldClass}
                    message-when-value-missing="Name is required"
                    aria-describedby={nameErrorId}
                    aria-invalid={hasNameError}>
                </lightning-input>
                <!-- Name field error message -->
                <template lwc:if={nameError}>
                    <div class="slds-form-element__help" id={nameErrorId} role="alert">
                        <span class="slds-icon_container slds-icon-utility-error">
                            <svg class="slds-icon slds-icon_xx-small slds-icon-text-error" aria-hidden="true">
                                <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#error"></use>
                            </svg>
                        </span>
                        {nameError}
                    </div>
                </template>
            </div>

            <!-- Email field with validation -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-input
                    name="email"
                    label="Email"
                    type="email"
                    placeholder="Enter your email address"
                    value={emailValue}
                    required
                    onchange={handleEmailChange}
                    onblur={handleEmailBlur}
                    class={emailFieldClass}
                    message-when-value-missing="Email is required"
                    message-when-type-mismatch="Please enter a valid email address"
                    aria-describedby={emailErrorId}
                    aria-invalid={hasEmailError}>
                </lightning-input>
                <!-- Email field error message -->
                <template lwc:if={emailError}>
                    <div class="slds-form-element__help" id={emailErrorId} role="alert">
                        <span class="slds-icon_container slds-icon-utility-error">
                            <svg class="slds-icon slds-icon_xx-small slds-icon-text-error" aria-hidden="true">
                                <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#error"></use>
                            </svg>
                        </span>
                        {emailError}
                    </div>
                </template>
            </div>

            <!-- Message field with character counter and validation -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-textarea
                    name="message"
                    label="Message"
                    placeholder="Enter your message (minimum 10 characters)"
                    value={messageValue}
                    required
                    max-length="500"
                    min-length="10"
                    rows="4"
                    onchange={handleMessageChange}
                    onblur={handleMessageBlur}
                    class={messageFieldClass}
                    message-when-value-missing="Message is required"
                    aria-describedby={messageErrorId}
                    aria-invalid={hasMessageError}>
                </lightning-textarea>

                <!-- Character counter -->
                <div class="slds-text-body_small slds-m-top_x-small character-counter">
                    <span class={characterCountClass}>{characterCountText}</span>
                </div>

                <!-- Message field error message -->
                <template lwc:if={messageError}>
                    <div class="slds-form-element__help" id={messageErrorId} role="alert">
                        <span class="slds-icon_container slds-icon-utility-error">
                            <svg class="slds-icon slds-icon_xx-small slds-icon-text-error" aria-hidden="true">
                                <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#error"></use>
                            </svg>
                        </span>
                        {messageError}
                    </div>
                </template>
            </div>

            <!-- Submit button with full width and brand styling -->
            <div class="slds-m-top_medium">
                <lightning-button
                    type="submit"
                    label="Submit"
                    variant="brand"
                    class="slds-button_stretch"
                    disabled={isSubmitting}
                    icon-name={submitButtonIcon}
                    onclick={handleSubmit}>
                </lightning-button>
            </div>
        </form>
    </div>
</template>
