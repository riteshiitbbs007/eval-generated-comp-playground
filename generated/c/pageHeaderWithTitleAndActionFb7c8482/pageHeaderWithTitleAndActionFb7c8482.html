<template>
    <!-- Page Header Container using SLDS utility classes -->
    <div class="slds-page-header" role="banner">
        <div class="slds-page-header__row">
            <div class="slds-page-header__col-title">
                <!-- Title Section with semantic header tag -->
                <div class="slds-media slds-media_center">
                    <div class="slds-media__body">
                        <div class="slds-page-header__name">
                            <div class="slds-page-header__name-title">
                                <h1>
                                    <span class="slds-page-header__title slds-truncate" title={title}>{title}</span>
                                </h1>
                            </div>
                        </div>
                        <template lwc:if={subtitle}>
                            <p class="slds-page-header__name-meta">{subtitle}</p>
                        </template>
                    </div>
                </div>
            </div>
            <div class="slds-page-header__col-actions">
                <!-- Action Buttons Section -->
                <div class="slds-page-header__controls">
                    <div class="slds-page-header__control">
                        <ul class="slds-button-group-list">
                            <template for:each={actionButtons} for:item="button">
                                <li key={button.id} class="slds-button-group-item">
                                    <lightning-button
                                        label={button.label}
                                        title={button.ariaLabel}
                                        variant={button.variant}
                                        icon-name={button.iconName}
                                        icon-position={button.iconPosition}
                                        disabled={button.disabled}
                                        aria-label={button.ariaLabel}
                                        data-action-id={button.id}
                                        onclick={handleActionClick}>
                                    </lightning-button>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
