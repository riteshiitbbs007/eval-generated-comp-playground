<template>
    <lightning-card title="Contact Information Form" icon-name="standard:form">
        <div class="slds-p-around_medium">
            <form onsubmit={handleSubmit}>
                <!-- Text Input for Name -->
                <lightning-input
                    label="Full Name"
                    name="fullName"
                    value={fullName}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please enter your full name"
                    class="slds-m-bottom_small">
                </lightning-input>

                <!-- Email Input -->
                <lightning-input
                    label="Email Address"
                    name="email"
                    type="email"
                    value={email}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please enter your email"
                    message-when-type-mismatch="Please enter a valid email address"
                    class="slds-m-bottom_small">
                </lightning-input>

                <!-- Phone Input -->
                <lightning-input
                    label="Phone Number"
                    name="phone"
                    type="tel"
                    value={phone}
                    onchange={handleInputChange}
                    required
                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                    message-when-value-missing="Please enter your phone number"
                    message-when-pattern-mismatch="Phone must be in format: 123-456-7890"
                    class="slds-m-bottom_small">
                </lightning-input>

                <!-- Dropdown/Combobox -->
                <lightning-combobox
                    label="Preferred Contact Method"
                    name="contactMethod"
                    value={contactMethod}
                    placeholder="Select an option"
                    options={contactMethodOptions}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please select a contact method"
                    class="slds-m-bottom_small">
                </lightning-combobox>

                <!-- Checkboxes for Multiple Selections -->
                <fieldset class="slds-form-element slds-m-bottom_small">
                    <legend class="slds-form-element__legend slds-form-element__label">Areas of Interest</legend>
                    <div class="slds-form-element__control">
                        <lightning-checkbox-group
                            name="interests"
                            label="Select all that apply"
                            options={interestOptions}
                            value={selectedInterests}
                            onchange={handleCheckboxChange}
                            variant="label-hidden">
                        </lightning-checkbox-group>
                    </div>
                </fieldset>

                <!-- Textarea for Comments -->
                <lightning-textarea
                    label="Additional Comments"
                    name="comments"
                    value={comments}
                    onchange={handleInputChange}
                    placeholder="Enter any additional information here..."
                    max-length="500"
                    class="slds-m-bottom_medium">
                </lightning-textarea>

                <!-- Submit Button -->
                <div class="slds-text-align_center">
                    <lightning-button
                        variant="brand"
                        type="submit"
                        label="Submit Form"
                        title="Submit the form"
                        class="slds-m-right_small">
                    </lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Reset"
                        title="Reset all fields"
                        onclick={handleReset}>
                    </lightning-button>
                </div>
            </form>

            <!-- Success Message -->
            <template lwc:if={showSuccessMessage}>
                <div class="slds-m-top_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                        <span class="slds-assistive-text">success</span>
                        <h2>Form submitted successfully!</h2>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
