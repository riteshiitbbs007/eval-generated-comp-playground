<template>
    <!-- Modal backdrop with SLDS classes for overlay effect -->
    <template lwc:if={isOpen}>
        <section
            role="dialog"
            tabindex="-1"
            aria-modal="true"
            aria-labelledby="modal-heading"
            aria-describedby="modal-content"
            class="slds-modal slds-fade-in-open"
            onkeydown={handleKeyDown}
        >
            <div class="slds-modal__container">
                <!-- Modal Header with warning icon -->
                <header class="slds-modal__header">
                    <lightning-icon
                        icon-name="utility:warning"
                        alternative-text="Warning"
                        variant="warning"
                        size="small"
                        class="slds-m-right_small"
                    ></lightning-icon>
                    <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">
                        {title}
                    </h2>
                </header>

                <!-- Modal Body with confirmation message -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content">
                    <p class="my-confirmation-text">{message}</p>
                </div>

                <!-- Modal Footer with action buttons -->
                <footer class="slds-modal__footer">
                    <button
                        class="slds-button slds-button_neutral"
                        onclick={handleCancel}
                        aria-label="Cancel delete action"
                    >
                        {cancelLabel}
                    </button>
                    <button
                        class="slds-button slds-button_destructive"
                        onclick={handleDelete}
                        aria-label="Confirm delete action"
                    >
                        {deleteLabel}
                    </button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" onclick={handleBackdropClick}></div>
    </template>
</template>
