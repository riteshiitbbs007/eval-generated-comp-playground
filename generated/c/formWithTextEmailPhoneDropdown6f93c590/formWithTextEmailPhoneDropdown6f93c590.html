<template>
    <div class="slds-card slds-p-around_medium">
        <!-- Form Header -->
        <div class="slds-card__header slds-m-bottom_medium">
            <h2 class="slds-text-heading_medium slds-text-align_center">
                Contact Information Form
            </h2>
        </div>

        <!-- Success Message -->
        <template lwc:if={showSuccessMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Success</span>
                <lightning-icon icon-name="utility:success" alternative-text="Success" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                <h2>Form submitted successfully!</h2>
            </div>
        </template>

        <!-- Form Fields -->
        <form class="slds-form" onsubmit={handleSubmit}>
            <!-- Full Name Field -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-input
                    name="fullName"
                    label="Full Name"
                    type="text"
                    value={formData.fullName}
                    onchange={handleInputChange}
                    required
                    placeholder="Enter your full name"
                ></lightning-input>
            </div>

            <!-- Email Field -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-input
                    name="email"
                    label="Email Address"
                    type="email"
                    value={formData.email}
                    onchange={handleInputChange}
                    required
                    placeholder="example@email.com"
                ></lightning-input>
            </div>

            <!-- Phone Field -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-input
                    name="phone"
                    label="Phone Number"
                    type="tel"
                    value={formData.phone}
                    onchange={handleInputChange}
                    required
                    placeholder="(123) 456-7890"
                    pattern="[0-9\s\(\)\-\+]+"
                ></lightning-input>
            </div>

            <!-- Country Dropdown -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-combobox
                    name="country"
                    label="Country"
                    value={formData.country}
                    options={countryOptions}
                    onchange={handleInputChange}
                    required
                    placeholder="Select a country"
                ></lightning-combobox>
            </div>

            <!-- Newsletter Checkboxes -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-checkbox-group
                    name="newsletter"
                    label="Newsletter Subscriptions"
                    options={newsletterOptions}
                    value={formData.newsletter}
                    onchange={handleInputChange}
                ></lightning-checkbox-group>
            </div>

            <!-- Comments Textarea -->
            <div class="slds-form-element slds-m-bottom_medium">
                <lightning-textarea
                    name="comments"
                    label="Comments"
                    value={formData.comments}
                    onchange={handleInputChange}
                    placeholder="Enter any additional comments or feedback"
                    max-length="500"
                ></lightning-textarea>
            </div>

            <!-- Form Actions -->
            <div class="slds-form-element slds-m-top_large">
                <div class="slds-button-group" role="group">
                    <lightning-button
                        variant="brand"
                        type="submit"
                        label="Submit"
                        class="slds-m-right_x-small"
                    ></lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Clear"
                        onclick={handleClear}
                    ></lightning-button>
                </div>
            </div>
        </form>
    </div>
</template>
