<template>
    <lightning-card title="Contact Information Form" icon-name="standard:form">
        <div class="slds-p-around_medium">
            <form onsubmit={handleSubmit}>
                <!-- Text Input -->
                <lightning-input
                    label="Full Name"
                    name="fullName"
                    value={formData.fullName}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please enter your full name"
                ></lightning-input>

                <!-- Email Input -->
                <lightning-input
                    type="email"
                    label="Email Address"
                    name="email"
                    value={formData.email}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please enter a valid email address"
                    message-when-type-mismatch="Please enter a valid email format"
                ></lightning-input>

                <!-- Phone Input -->
                <lightning-input
                    type="tel"
                    label="Phone Number"
                    name="phone"
                    value={formData.phone}
                    onchange={handleInputChange}
                    required
                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                    message-when-pattern-mismatch="Please enter phone in format: 123-456-7890"
                    placeholder="123-456-7890"
                ></lightning-input>

                <!-- Dropdown/Combobox -->
                <lightning-combobox
                    label="Country"
                    name="country"
                    value={formData.country}
                    placeholder="Select a country"
                    options={countryOptions}
                    onchange={handleInputChange}
                    required
                    message-when-value-missing="Please select a country"
                ></lightning-combobox>

                <!-- Checkbox Group -->
                <lightning-checkbox-group
                    label="Interests"
                    name="interests"
                    options={interestOptions}
                    value={formData.interests}
                    onchange={handleCheckboxChange}
                ></lightning-checkbox-group>

                <!-- Textarea -->
                <lightning-textarea
                    label="Additional Comments"
                    name="comments"
                    value={formData.comments}
                    onchange={handleInputChange}
                    max-length="500"
                    placeholder="Enter any additional information (max 500 characters)"
                ></lightning-textarea>

                <!-- Form Actions -->
                <div class="slds-m-top_medium">
                    <lightning-button
                        variant="brand"
                        type="submit"
                        label="Submit"
                        title="Submit form"
                        class="slds-m-right_small"
                    ></lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Reset"
                        title="Reset form"
                        onclick={handleReset}
                    ></lightning-button>
                </div>

                <!-- Success Message -->
                <template lwc:if={showSuccessMessage}>
                    <div class="slds-m-top_medium">
                        <div class="slds-notify slds-notify_alert slds-alert_success" role="alert">
                            <span class="slds-assistive-text">Success</span>
                            <h2>Form submitted successfully!</h2>
                        </div>
                    </div>
                </template>
            </form>
        </div>
    </lightning-card>
</template>
